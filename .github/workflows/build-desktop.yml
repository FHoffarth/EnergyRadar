name: Build Desktop Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Use 3.11 or whichever is stable and has pre-built wheels
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r energyradar/requirements.txt
          pip install pyinstaller pytest

      - name: Run Tests
        env:
          PYTHONPATH: energyradar
        run: pytest tests/ -v

      - name: Build with PyInstaller
        run: pyinstaller EnergyRadar_QML.spec --noconfirm

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnergyRadar-Windows
          path: dist/EnergyRadar/

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r energyradar/requirements.txt
          pip install pyinstaller pytest

      - name: Run Tests
        env:
          PYTHONPATH: energyradar
        run: pytest tests/ -v

      - name: Build with PyInstaller
        run: pyinstaller EnergyRadar_QML.spec --noconfirm

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnergyRadar-macOS
          path: dist/EnergyRadar.app/
