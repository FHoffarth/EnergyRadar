name: Build

# Baut EnergyRadar bei jedem Push auf main automatisch für Windows und macOS
# und lädt die fertigen Programme als Artefakte hoch. Zusätzlich manuell
# über den "Run workflow"-Knopf startbar. Keine Secrets nötig.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

# Laufende Builds für denselben Ref abbrechen, wenn neu gepusht wird –
# spart Runner-Zeit und vermeidet veraltete Artefakte.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# Minimale Rechte: der Workflow liest nur den Code, mehr braucht er nicht.
permissions:
  contents: read

env:
  # Der macOS-Build bleibt unabhängig vom explizit auf Python 3.14 x64
  # festgelegten Windows-Build.
  MACOS_PYTHON_VERSION: "3.12"

jobs:
  # --------------------------------------------------------------------- #
  # Windows: erzeugt dist/EnergyRadar/EnergyRadar.exe via build_windows.ps1
  # --------------------------------------------------------------------- #
  windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          # Muss mit der Versions-/Architekturpruefung in build_windows.ps1
          # uebereinstimmen.
          python-version: "3.14"
          architecture: x64
          cache: pip
          cache-dependency-path: |
            energyradar/requirements.txt
            requirements-build.txt

      - name: pip aktualisieren
        shell: pwsh
        run: python -m pip install --upgrade pip

      # Nutzt das vorhandene Build-Skript (Requirements + Icon + PyInstaller).
      - name: Build (PyInstaller)
        shell: pwsh
        run: |
          Set-ExecutionPolicy -Scope Process -ExecutionPolicy Bypass -Force
          ./build_windows.ps1

      - name: Build-Ergebnis prüfen
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/EnergyRadar/EnergyRadar.exe")) {
            throw "Erwartete Datei dist/EnergyRadar/EnergyRadar.exe fehlt."
          }

      # Der gesamte Ordner ist lauffähig (EnergyRadar.exe + _internal/).
      # upload-artifact packt den Inhalt automatisch in ein ZIP.
      - name: Artefakt hochladen (EnergyRadar.exe)
        uses: actions/upload-artifact@v4
        with:
          name: EnergyRadar-windows
          path: dist/EnergyRadar
          if-no-files-found: error
          retention-days: 30

  # --------------------------------------------------------------------- #
  # macOS: erzeugt dist/EnergyRadar.app via build_macos.sh
  #
  # WICHTIG – Architektur: PyInstaller cross-compiliert nicht, sondern baut für
  # die Architektur des Runners. 'macos-latest' ist Apple Silicon (arm64) und
  # erzeugt daher eine reine arm64-App, die auf Intel-Macs NICHT startet.
  # 'macos-13' wurde am 4. Dezember 2025 stillgelegt. Der offizielle
  # x86_64-Nachfolger 'macos-15-intel' erzeugt eine Intel-App, die nativ auf
  # Intel-Macs UND per Rosetta 2 auf Apple Silicon läuft.
  # --------------------------------------------------------------------- #
  macos:
    name: Build macOS (Intel .app)
    runs-on: macos-15-intel   # Intel/x86_64 – bewusst NICHT macos-latest (arm64)
    timeout-minutes: 30
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.MACOS_PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            energyradar/requirements.txt
            requirements-build.txt

      - name: pip aktualisieren
        run: python3 -m pip install --upgrade pip

      # Nutzt das vorhandene Build-Skript (Requirements + .icns + PyInstaller).
      # sips und iconutil sind auf macOS-Runnern vorinstalliert.
      - name: Build (PyInstaller)
        run: bash build_macos.sh

      - name: Build-Ergebnis prüfen
        run: |
          test -d "dist/EnergyRadar.app" || { echo "dist/EnergyRadar.app fehlt."; exit 1; }

      # Diagnose: macht Architektur (x86_64/arm64) und Bundle-Eigenschaften im
      # Log sichtbar. Rein informativ – schlägt nie fehl (eine unsignierte App
      # lässt codesign/spctl mit non-zero enden, das ist hier erwartet).
      - name: Diagnose (Architektur & Bundle)
        run: |
          set +e
          APP="dist/EnergyRadar.app"
          BIN="$APP/Contents/MacOS/EnergyRadar"
          echo "== file (Dateityp/Architektur) =="       ; file "$BIN"
          echo "== lipo -archs (enthaltene Architekturen) ==" ; lipo -archs "$BIN"
          echo "== otool -hv (Mach-O Header) =="          ; otool -hv "$BIN"
          echo "== otool -L (verlinkte Libraries) =="     ; otool -L "$BIN" | head -n 20
          echo "== Info.plist =="                         ; plutil -p "$APP/Contents/Info.plist"
          echo "== codesign (Signaturstatus) =="          ; codesign -dvvv "$APP" 2>&1
          echo "== spctl (Gatekeeper-Bewertung) =="       ; spctl -a -t exec -vvv "$APP" 2>&1
          exit 0

      # ditto erhält Bundle-Struktur und Ausführungsrechte (anders als ein
      # normales zip). So bleibt die .app nach dem Download lauffähig.
      - name: .app paketieren
        run: ditto -c -k --keepParent "dist/EnergyRadar.app" "dist/EnergyRadar-macos.zip"

      - name: Artefakt hochladen (EnergyRadar.app)
        uses: actions/upload-artifact@v4
        with:
          name: EnergyRadar-macos
          path: dist/EnergyRadar-macos.zip
          if-no-files-found: error
          retention-days: 30

  # --------------------------------------------------------------------- #
  # Release: Ein v*-Tag veröffentlicht exakt die oben gebauten Artefakte.
  # Apple Silicon wird erst ergänzt, sobald ein separater arm64-Build
  # validiert ist.
  # --------------------------------------------------------------------- #
  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [windows, macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Windows-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: EnergyRadar-windows
          path: release/EnergyRadar-Windows-x64

      - name: macOS-Artefakt herunterladen
        uses: actions/download-artifact@v4
        with:
          name: EnergyRadar-macos
          path: release/macos

      - name: Release-Dateien paketieren und prüfen
        shell: bash
        run: |
          set -euo pipefail
          test -f "release/EnergyRadar-Windows-x64/EnergyRadar.exe"
          test -f "release/macos/EnergyRadar-macos.zip"

          (
            cd release
            zip -q -r "EnergyRadar-Windows-x64.zip" "EnergyRadar-Windows-x64"
            mv "macos/EnergyRadar-macos.zip" "EnergyRadar-macOS-Intel.zip"
            sha256sum \
              "EnergyRadar-Windows-x64.zip" \
              "EnergyRadar-macOS-Intel.zip" \
              > "SHA256SUMS.txt"
          )

      - name: GitHub Release erstellen und Assets veröffentlichen
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --verify-tag \
              --title "EnergyRadar $GITHUB_REF_NAME" \
              --generate-notes
          gh release upload "$GITHUB_REF_NAME" \
            "release/EnergyRadar-Windows-x64.zip" \
            "release/EnergyRadar-macOS-Intel.zip" \
            "release/SHA256SUMS.txt" \
            --clobber
