name: Build

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  WINDOWS_PYTHON_VERSION: "3.14"
  MACOS_PYTHON_VERSION: "3.12"

jobs:
  windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/react-ui/package-lock.json

      - name: Build React UI
        working-directory: frontend/react-ui
        shell: pwsh
        run: |
          npm.cmd ci
          npm.cmd run lint
          npm.cmd run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.WINDOWS_PYTHON_VERSION }}
          architecture: x64
          cache: pip
          cache-dependency-path: |
            energyradar/requirements.txt
            requirements-build.txt

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r energyradar/requirements.txt -r requirements-build.txt

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest tests/ -v

      - name: Build canonical desktop bundle
        run: python tools/build.py

      - name: Validate bundle contract
        shell: pwsh
        run: |
          $requiredFiles = @(
            "dist/EnergyRadar/EnergyRadar.exe",
            "dist/EnergyRadar/_internal/react-ui/dist/index.html",
            "dist/EnergyRadar/_internal/PySide6/Qt6WebEngineCore.dll",
            "dist/EnergyRadar/_internal/PySide6/QtWebEngineProcess.exe",
            "dist/EnergyRadar/_internal/PySide6/plugins/platforms/qwindows.dll"
          )
          foreach ($file in $requiredFiles) {
            if (-not (Test-Path -LiteralPath $file -PathType Leaf)) {
              throw "Incomplete Windows bundle: $file is missing."
            }
          }

      - name: Packaged startup smoke
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.Windows.Forms
          Add-Type @'
          using System;
          using System.Runtime.InteropServices;
          public static class WindowAudit {
              [StructLayout(LayoutKind.Sequential)]
              public struct RECT { public int Left, Top, Right, Bottom; }
              [DllImport("user32.dll")]
              public static extern bool GetWindowRect(IntPtr hWnd, out RECT rect);
              [DllImport("user32.dll")]
              public static extern bool IsWindowVisible(IntPtr hWnd);
              [DllImport("user32.dll")]
              public static extern bool IsIconic(IntPtr hWnd);
          }
          '@

          $smokeProfile = Join-Path $env:RUNNER_TEMP "energyradar-window-smoke"
          $smokeData = Join-Path $smokeProfile "EnergyRadar"
          New-Item -ItemType Directory -Path $smokeData -Force | Out-Null
          '{"width":980,"height":900,"x":-32000,"y":-32000}' |
            Set-Content -LiteralPath (Join-Path $smokeData "window.json") -Encoding utf8
          $env:LOCALAPPDATA = $smokeProfile
          Remove-Item Env:FRONIUS_URL -ErrorAction SilentlyContinue
          Remove-Item Env:ENERGYRADAR_DEMO -ErrorAction SilentlyContinue

          $process = Start-Process -FilePath "dist/EnergyRadar/EnergyRadar.exe" -PassThru
          $deadline = (Get-Date).AddSeconds(30)
          $stableAfter = (Get-Date).AddSeconds(10)
          $started = $false

          try {
            while ((Get-Date) -lt $deadline) {
              Start-Sleep -Milliseconds 500
              $process.Refresh()
              if ($process.HasExited) {
                throw "EnergyRadar exited during startup with code $($process.ExitCode)."
              }
              if ((Get-Date) -ge $stableAfter -and $process.MainWindowTitle -eq "EnergyRadar") {
                $handle = [IntPtr]$process.MainWindowHandle
                if ($handle -eq [IntPtr]::Zero -or -not [WindowAudit]::IsWindowVisible($handle)) {
                  throw "EnergyRadar did not create a visible top-level window."
                }
                if ([WindowAudit]::IsIconic($handle)) {
                  throw "EnergyRadar restored in a minimized state."
                }

                $rect = New-Object WindowAudit+RECT
                if (-not [WindowAudit]::GetWindowRect($handle, [ref]$rect)) {
                  throw "Could not read the EnergyRadar window geometry."
                }
                $onScreen = [System.Windows.Forms.Screen]::AllScreens | Where-Object {
                  $bounds = $_.Bounds
                  $rect.Right -gt $bounds.Left -and
                  $rect.Left -lt $bounds.Right -and
                  $rect.Bottom -gt $bounds.Top -and
                  $rect.Top -lt $bounds.Bottom
                }
                if (-not $onScreen) {
                  throw "EnergyRadar window is outside every monitor."
                }
                Write-Host "Visible on-screen EnergyRadar window verified."
                $started = $true
                break
              }
            }
            if (-not $started) {
              throw "No EnergyRadar window appeared within 30 seconds."
            }
          }
          finally {
            $process.Refresh()
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

          $diagnosticLog = Join-Path $smokeData "energyradar.log"
          if (-not (Test-Path -LiteralPath $diagnosticLog)) {
            throw "Packaged startup diagnostic log is missing."
          }
          if (Select-String -LiteralPath $diagnosticLog -SimpleMatch "[ERROR]" -Quiet) {
            Get-Content -LiteralPath $diagnosticLog
            throw "Packaged startup diagnostics contain an error."
          }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnergyRadar-windows
          path: dist/EnergyRadar
          if-no-files-found: error
          retention-days: 30

  macos:
    name: Build macOS (Intel .app)
    runs-on: macos-15-intel
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/react-ui/package-lock.json

      - name: Build React UI
        working-directory: frontend/react-ui
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.MACOS_PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            energyradar/requirements.txt
            requirements-build.txt

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r energyradar/requirements.txt -r requirements-build.txt

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python3 -m pytest tests/ -v

      - name: Build canonical desktop bundle
        run: python3 tools/build.py

      - name: Validate bundle contract
        run: |
          set -euo pipefail
          APP="dist/EnergyRadar.app"
          BIN="$APP/Contents/MacOS/EnergyRadar"
          test -x "$BIN"
          find "$APP" -path "*/react-ui/dist/index.html" -type f | grep -q .
          find "$APP" -name "QtWebEngineProcess" -type f | grep -q .
          file "$BIN"
          lipo -archs "$BIN" | grep -qw x86_64
          plutil -lint "$APP/Contents/Info.plist"

      - name: Package macOS app
        run: ditto -c -k --keepParent "dist/EnergyRadar.app" "dist/EnergyRadar-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnergyRadar-macos
          path: dist/EnergyRadar-macos.zip
          if-no-files-found: error
          retention-days: 30

  package:
    name: Prepare release assets
    needs: [windows, macos]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: EnergyRadar-windows
          path: package-input/EnergyRadar-Windows-x64

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: EnergyRadar-macos
          path: package-input/macos

      - name: Package and checksum release files
        shell: bash
        run: |
          set -euo pipefail
          test -f "package-input/EnergyRadar-Windows-x64/EnergyRadar.exe"
          test -f "package-input/macos/EnergyRadar-macos.zip"
          mkdir release-assets
          (
            cd package-input
            zip -q -r "../release-assets/EnergyRadar-Windows-x64.zip" "EnergyRadar-Windows-x64"
            mv "macos/EnergyRadar-macos.zip" "../release-assets/EnergyRadar-macOS-Intel.zip"
            cd ../release-assets
            sha256sum \
              "EnergyRadar-Windows-x64.zip" \
              "EnergyRadar-macOS-Intel.zip" \
              > "SHA256SUMS.txt"
          )

      - name: Validate release asset contract
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          expected_files=$'EnergyRadar-Windows-x64.zip\nEnergyRadar-macOS-Intel.zip\nSHA256SUMS.txt'
          actual_files="$(find . -mindepth 1 -maxdepth 1 -printf '%f\n' | sort)"
          test "$actual_files" = "$(printf '%s\n' "$expected_files" | sort)"
          sha256sum --check --strict SHA256SUMS.txt

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: EnergyRadar-release-assets
          path: |
            release-assets/EnergyRadar-Windows-x64.zip
            release-assets/EnergyRadar-macOS-Intel.zip
            release-assets/SHA256SUMS.txt
          if-no-files-found: error
          retention-days: 30
