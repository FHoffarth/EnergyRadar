<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnergyRadar – Offline</title>
<style>
  @font-face {
    font-family: "Inter";
    src: url("/static/fonts/Inter-Regular.woff2") format("woff2");
    font-style: normal;
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: "Inter";
    src: url("/static/fonts/Inter-SemiBold.woff2") format("woff2");
    font-style: normal;
    font-weight: 600;
    font-display: swap;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #07111E;
    color: #FFFFFF;
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    text-align: center;
    padding: 24px;
  }
  h1 { font-size: 1.4rem; font-weight: 600; margin: 0; }
  p { color: #7A8DA0; margin: 0; max-width: 320px; line-height: 1.5; }
  button {
    margin-top: 16px;
    background: #FFD54A;
    color: #07111E;
    border: none;
    border-radius: 999px;
    padding: 10px 24px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  @media (prefers-color-scheme: light) {
    body { background: #F2F5F8; color: #0B1B2B; }
    p { color: #5C6B7A; }
  }
</style>
</head>
<body>
  <div style="font-size:3rem">🌙</div>
  <h1 id="offline-title">You're offline</h1>
  <p id="offline-copy">EnergyRadar needs a connection to your home network to load live data from the inverter.</p>
  <button id="retry" onclick="location.reload()">Try again</button>
  <script>
    const isGerman = (navigator.languages?.[0] || navigator.language || "en")
      .toLowerCase()
      .startsWith("de");
    document.documentElement.lang = isGerman ? "de" : "en";
    if (isGerman) {
      document.getElementById("offline-title").textContent = "Du bist offline";
      document.getElementById("offline-copy").textContent =
        "EnergyRadar braucht eine Verbindung zu deinem Heimnetz, um Live-Daten vom Wechselrichter zu laden.";
      document.getElementById("retry").textContent = "Erneut versuchen";
    }
  </script>
</body>
</html>
