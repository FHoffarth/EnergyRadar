<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>EnergyRadar</title>
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" id="meta-theme" content="#07111E">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EnergyRadar">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png">
  <link rel="preload" href="/static/fonts/Inter-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/static/fonts/Inter-SemiBold.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/static/style.css?v=12">
</head>
<body>
  <div class="sky" id="living-sky" aria-hidden="true">
    <div class="sky__atmosphere"></div><div class="sky__glow"></div>
    <div class="sky__stars"></div><div class="sky__scrim"></div>
  </div>

  <header class="app-header">
    <div class="brand"><span class="brand-mark" aria-hidden="true">☀</span><span>EnergyRadar</span></div>
    <div class="header-controls">
      <button class="connection-badge" id="connection-button" type="button" aria-haspopup="dialog">
        <span class="status-dot" aria-hidden="true"></span><span id="badge">Connecting …</span>
      </button>
      <button class="theme-toggle" id="theme-toggle" data-i18n-aria="themeToggle" aria-label="Switch appearance">◐</button>
    </div>
  </header>

  <main class="workspace">
    <section class="hero" data-i18n-aria="energyState" aria-label="Current energy status">
      <div class="hero-copy">
        <h1 class="greeting" id="greeting"></h1>
        <p class="message" id="message"></p>
      </div>

      <div class="gauge-wrap">
        <svg class="gauge" viewBox="0 0 200 112" aria-hidden="true">
          <path class="gauge-track" d="M 16 104 A 84 84 0 0 1 184 104"></path>
          <path class="gauge-fill" id="gauge-fill" d="M 16 104 A 84 84 0 0 1 184 104"></path>
        </svg>
        <div class="power">
          <span id="power">–</span><span class="unit" id="power-unit">W</span>
          <div class="power-label" data-i18n="currentPower">Current power</div>
        </div>
      </div>

      <div class="insight">
        <div class="label" data-i18n="insight">Insight</div>
        <p class="insight-text" id="recommendation"></p>
        <p class="insight-detail" id="action" hidden></p>
        <p class="memory-line" id="memory" hidden></p>
        <button class="primary-button setup-cta" id="setup-cta" type="button" hidden></button>
      </div>
    </section>

    <section class="stats" aria-label="Energy totals">
      <div class="stat"><div class="label" data-i18n="today">Today</div><div class="value"><span id="today">–</span> <span class="unit">kWh</span></div></div>
      <div class="stat"><div class="label" data-i18n="peak">Today's peak</div><div class="value"><span id="peak">–</span> <span class="unit" id="peak-unit">W</span></div><div class="sub" id="peak-time"></div></div>
      <div class="stat"><div class="label" data-i18n="year">This year</div><div class="value"><span id="year">–</span> <span class="unit">kWh</span></div></div>
      <div class="stat"><div class="label" data-i18n="lifetime">Lifetime</div><div class="value"><span id="total">–</span> <span class="unit">kWh</span></div></div>
    </section>

    <section class="chart-section">
      <div class="label" data-i18n="todayChart">Today's production</div>
      <div class="chart-wrap"><canvas id="chart"></canvas></div>
    </section>
  </main>

  <footer><span id="updated"></span><span class="footer-meta"><span>EnergyRadar v1.0</span><span>© 2026 Florian Hoffarth</span></span></footer>

  <dialog class="setup-dialog" id="setup-dialog" aria-labelledby="setup-title">
    <form class="setup-panel" id="setup-form" method="dialog">
      <div class="setup-heading">
        <div><div class="eyebrow" data-i18n="energySystem">Energy system</div><h2 id="setup-title" data-i18n="setupTitle">Connect Fronius</h2></div>
        <button class="icon-button" id="setup-close" type="button" aria-label="Close">×</button>
      </div>
      <p class="setup-intro" data-i18n="setupIntro"></p>
      <label class="field"><span data-i18n="provider">Provider</span><input value="Fronius" disabled></label>
      <label class="field"><span data-i18n="address">IP address or hostname</span><input id="source-address" name="address" type="text" inputmode="url" autocomplete="off" spellcheck="false" placeholder="fronius.local" required></label>
      <p class="field-hint" data-i18n="addressHint"></p>
      <div class="setup-status" id="setup-status" role="status" aria-live="polite"></div>
      <div class="setup-actions">
        <button class="secondary-button" id="test-connection" type="button" data-i18n="testConnection">Test connection</button>
        <button class="primary-button" id="save-connection" type="button" data-i18n="saveLocally">Save locally</button>
      </div>
      <button class="remove-button" id="remove-connection" type="button" hidden data-i18n="removeConnection">Remove connection</button>
    </form>
  </dialog>

  <script src="/static/vendor/chart.umd.js"></script>
  <script src="/static/energy-state.js?v=3"></script>
  <script src="/static/background.js?v=4"></script>
  <script src="/static/app.js?v=10"></script>
</body>
</html>
