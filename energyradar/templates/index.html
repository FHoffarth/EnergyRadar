<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>EnergyRadar</title>

<!-- PWA -->
<link rel="manifest" href="/static/manifest.webmanifest">
<meta name="theme-color" id="meta-theme" content="#07111E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EnergyRadar">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/static/icons/favicon-32.png">
<link rel="preload" href="/static/fonts/Inter-Regular.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/static/fonts/Inter-SemiBold.woff2" as="font" type="font/woff2" crossorigin>

<link rel="stylesheet" href="/static/style.css?v=9">
</head>
<body>

<!-- Living Sky: zustandsbasierte CSS-Atmosphäre hinter allen Inhalten -->
<div class="sky" id="living-sky" aria-hidden="true">
  <div class="sky__atmosphere"></div>
  <div class="sky__glow"></div>
  <div class="sky__stars"></div>
  <div class="sky__scrim"></div>
</div>

<header class="app-header">
  <div class="brand">
    <h1>☀️ EnergyRadar</h1>
    <p class="tagline">Understand your energy.</p>
  </div>
  <div class="header-controls">
    <div class="badge" id="badge" data-i18n="connecting">⚪ Connecting …</div>
    <button class="theme-toggle" id="theme-toggle" data-i18n-aria="themeToggle" aria-label="Switch appearance">🌙</button>
  </div>
</header>

<main class="workspace">

  <section class="energy-presence" data-i18n-aria="energyState" aria-label="Current energy status">
    <!-- Current Situation -->
    <div class="hero">
      <div class="label" data-i18n="currentPower">Current Power</div>
      <div class="power">
        <span id="power">–</span><span class="unit" id="power-unit">W</span>
      </div>
    </div>

    <!-- Assessment -->
    <div class="assessment" id="assessment-card">
      <div class="label" data-i18n="assessment">Assessment</div>
      <div class="recommendation" id="recommendation" data-i18n="connecting">⚪ Connecting …</div>
      <div class="action" id="action" hidden></div>
    </div>
  </section>

  <!-- Stats -->
  <section class="stats">
    <div class="stat">
      <div class="label" data-i18n="today">Today</div>
      <div class="value"><span id="today">–</span> <span class="unit">kWh</span></div>
    </div>
    <div class="stat">
      <div class="label" data-i18n="peak">Today's Peak</div>
      <div class="value"><span id="peak">–</span> <span class="unit" id="peak-unit">W</span></div>
      <div class="sub" id="peak-time"></div>
    </div>
    <div class="stat">
      <div class="label" data-i18n="year">This Year</div>
      <div class="value"><span id="year">–</span> <span class="unit">kWh</span></div>
    </div>
    <div class="stat">
      <div class="label" data-i18n="lifetime">Lifetime</div>
      <div class="value"><span id="total">–</span> <span class="unit">kWh</span></div>
    </div>
  </section>

  <!-- Tagesdiagramm -->
  <section class="chart-card">
    <div class="label" data-i18n="todayChart">Today's Production</div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
  </section>

</main>

<footer>
  <span id="updated"></span>
  <span class="footer-meta">
    <span class="version">EnergyRadar v1.0</span>
    <span class="copyright">© 2026 Florian Hoffarth</span>
  </span>
</footer>

<script src="/static/vendor/chart.umd.js"></script>
<script src="/static/energy-state.js?v=2"></script>
<script src="/static/background.js?v=4"></script>
<script src="/static/app.js?v=8"></script>

</body>
</html>
